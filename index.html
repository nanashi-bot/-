<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">

<title>推し育成ゲーム</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f2f2f7;
}

/* ===== 画面切替 ===== */
.screen {
  display: none;
  height: 100vh;
  overflow-y: auto;
}

.active {
  display: block;
}

/* ===== 一覧 ===== */
#grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  padding: 10px;
}

.card {
  background: white;
  border-radius: 16px;
  padding: 10px;
  text-align: center;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

.card img {
  width: 100%;
  height: 120px;
  object-fit: cover;
  border-radius: 12px;
}

/* ===== ボタン ===== */
button {
  background: #ff5c8a;
  color: white;
  border: none;
  padding: 12px;
  border-radius: 12px;
  margin-top: 8px;
  width: 100%;
}

/* ===== 詳細 ===== */
#detail {
  padding: 14px;
  text-align: center;
}

#petImage {
  width: 160px;
  height: 160px;
  border-radius: 18px;
  object-fit: cover;
  margin: 10px 0;
}

input {
  padding: 8px;
  border-radius: 10px;
  border: 1px solid #ddd;
  width: 90%;
  margin-top: 6px;
}

/* ===== 追加ボタン固定 ===== */
#addBtn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  font-size: 28px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<!-- ===== 一覧画面 ===== -->
<div id="listScreen" class="screen active">
  <div id="grid"></div>
</div>

<!-- ===== 詳細画面 ===== -->
<div id="detailScreen" class="screen">
  <div id="detail">
    <h2 id="name"></h2>
    <p>出会って <span id="days"></span> 日</p>

    <img id="petImage">

    <h3>🍚 <span id="food"></span>%</h3>
    <h3>💗 <span id="love"></span>%</h3>

    <button onclick="feed()">ご飯</button>
    <button onclick="loveUp()">愛でる</button>

    <input id="nameInput" placeholder="名前">
    <button onclick="changeName()">名前変更</button>

    <button onclick="back()">戻る</button>
  </div>
</div>

<!-- ===== 追加ボタン ===== -->
<button id="addBtn" onclick="addPet()">＋</button>

<script>
let pets = JSON.parse(localStorage.getItem("pets")) || [];
let current = 0;

function save(){
  localStorage.setItem("pets", JSON.stringify(pets));
}

if(pets.length === 0){
  pets.push({
    name:"りん",
    food:100,
    love:100,
    start:Date.now(),
    image:""
  });
  save();
}

/* ===== 画面切替 ===== */
function showList(){
  document.getElementById("listScreen").classList.add("active");
  document.getElementById("detailScreen").classList.remove("active");
  render();
}

function showDetail(){
  document.getElementById("listScreen").classList.remove("active");
  document.getElementById("detailScreen").classList.add("active");
}

/* ===== 追加 ===== */
function addPet(){
  pets.push({
    name:"なまえ未設定",
    food:100,
    love:100,
    start:Date.now(),
    image:""
  });
  save();
  render();
}

/* ===== 選択 ===== */
function selectPet(i){
  current = i;
  showDetail();
  render();
}

/* ===== 操作 ===== */
function feed(){
  pets[current].food = Math.min(100, pets[current].food + 10);
  save(); render();
}

function loveUp(){
  pets[current].love = Math.min(100, pets[current].love + 10);
  save(); render();
}

function changeName(){
  pets[current].name = document.getElementById("nameInput").value;
  save(); render();
}

function back(){
  showList();
}

/* ===== 表示 ===== */
function render(){

  let grid = "";

  pets.forEach((p,i)=>{
    grid += `
      <div class="card" onclick="selectPet(${i})">
        <img src="${p.image || ''}">
        <b>${p.name}</b>
        <div>🍚${p.food}% 💗${p.love}%</div>
      </div>
    `;
  });

  document.getElementById("grid").innerHTML = grid;

  let p = pets[current];
  if(!p) return;

  document.getElementById("name").innerText = p.name;
  document.getElementById("food").innerText = p.food;
  document.getElementById("love").innerText = p.love;
  document.getElementById("petImage").src = p.image || "";

  let days = Math.floor((Date.now()-p.start)/(1000*60*60*24));
  document.getElementById("days").innerText = days;
}

render();
</script>

</body>
</html>
